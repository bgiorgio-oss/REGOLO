# Contratto proposto — spike structured output, via instructor (from_genai)
meta:
  gara: Spazio alla Meta 2026
  codice: SAM2026
  contratto_versione: 1
  valido_dal: '2026-04-01'
  valido_al: '2026-09-30'
destinatari:
  tipo: punti vendita
  requisiti: Punti vendita "Spazio Enel Partner" che abbiano formalizzato l'adesione
    entro il 31/03/2026 e che risultino attivi e in regola con gli obblighi contrattuali
    alla data di inizio dell'Operazione.
  fonte_clausola: Art. 2
cluster:
  criterio: media mensile di attivazioni commodity registrata nell'anno 2025
  fonte_clausola: Art. 4.1
  definizioni:
  - id: GOLD
    condizione: Media mensile attivazioni 2025 ≥ 60
    target_mensile_commodity: 80
  - id: SILVER
    condizione: Media mensile attivazioni 2025 da 30 a 59
    target_mensile_commodity: 50
  - id: BRONZE
    condizione: Media mensile attivazioni 2025 < 30
    target_mensile_commodity: 30
kpi:
- id: luce_gas
  descrizione: Contratto Luce o Gas residenziale
- id: fibra
  descrizione: Contratto Fibra
- id: fotovoltaico
  descrizione: Impianto fotovoltaico
- id: wallbox
  descrizione: Wallbox di ricarica
- id: clima
  descrizione: Climatizzatore
meccaniche:
- id: luce_gas
  tipo: punti_per_unita
  fonte_clausola: Art. 5.1, Art. 5.6
  punti: 10.0
  cap_mensile_punti: 600
  ricorrenza: mensile
- id: fibra
  tipo: punti_per_unita
  fonte_clausola: Art. 5.2
  punti: 20.0
  ricorrenza: mensile
- id: fotovoltaico
  tipo: punti_per_unita
  fonte_clausola: Art. 5.3
  punti: 150.0
  ricorrenza: mensile
- id: wallbox
  tipo: punti_per_unita
  fonte_clausola: Art. 5.4
  punti: 60.0
  ricorrenza: mensile
- id: clima
  tipo: punti_per_unita
  fonte_clausola: Art. 5.5, Art. 6.3
  punti: 40.0
  moltiplicatori:
  - periodi:
    - 2026-06
    - 2026-07
    fattore: 1.5
    fonte_clausola: Art. 6.3
  ricorrenza: mensile
- id: storno_generico
  tipo: storno
  fonte_clausola: Art. 5.7
  regola: In caso di annullamento, recesso o mancata attivazione effettiva del contratto
    entro 60 giorni, i punti corrispondenti saranno stornati dal saldo del PV, anche
    in Mesi di Gara successivi a quello di maturazione.
- id: bonus_obiettivo
  tipo: bonus_condizionale
  fonte_clausola: Art. 6.1, Art. 6.4
  punti: 200.0
  condizione: Raggiungimento dell'obiettivo mensile di cluster (Art. 4.1), calcolato
    sulle attivazioni commodity al netto degli storni.
  ricorrenza: mensile
  liquidazione: in sede di consolidamento del Mese di Gara, sulla base dei dati validati.
- id: bonus_tripletta
  tipo: bonus_condizionale
  fonte_clausola: Art. 6.2, Art. 6.4
  punti: 100.0
  condizione: Il PV nello stesso Mese di Gara realizzi almeno un fotovoltaico, una
    wallbox e un climatizzatore.
  ricorrenza: mensile
  liquidazione: in sede di consolidamento del Mese di Gara, sulla base dei dati validati.
classifica_finale:
  ambito: per ciascun cluster
  indice: Il totale dei punti maturati nei Mesi di Gara conclusi, rapportato all'obiettivo
    mensile del cluster moltiplicato per il numero di Mesi di Gara conclusi.
  premi_punti_extra:
  - posizione: 1
    punti: 5000
  - posizione: 2
    punti: 3000
  - posizione: 3
    punti: 1500
  fonte_clausola: Art. 7.1, Art. 7.2
valorizzazione:
  tasso_eur_per_punto: 0.25
  catalogo: catalogo premi dedicato
  accredito: con cadenza mensile, entro il giorno 10 del mese successivo al Mese di
    Gara di riferimento, previa validazione dei dati da parte dell'Agenzia.
  fonte_clausola: Art. 8.1, Art. 8.2
caricamenti:
  flusso_prestazioni: I dati di prestazione (attivazioni, vendite, annullamenti) sono
    trasmessi mensilmente dal Promotore all'Agenzia entro il giorno 5 del mese successivo
    al Mese di Gara di riferimento.
  finestra_contestazioni_giorni: 30
  fonte_clausola: Art. 9.1, Art. 9.2
clausole_da_verificare:
- articolo: Art. 5.7
  dubbio: La decorrenza dei 60 giorni per lo storno non è specificata (es. da attivazione,
    da annullamento, da recesso).
