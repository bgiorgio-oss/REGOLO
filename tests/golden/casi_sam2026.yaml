# ============================================================================
# GOLDEN TEST DI GARA — SAM2026
# Casi limite derivati dal regolamento: input → punteggi attesi per meccanica.
# Ogni caso viene eseguito su ENTRAMBI i motori (Python + ZEN/JDM): devono
# coincidere tra loro e con l'atteso. È il collaudo che accompagnerà ogni
# modifica di contratto/motore (pattern golden test, cfr. ROADMAP Blocco 1.2).
#
# Campi: contratto_v (1|2 — il runner verifica anche la coerenza con
# l'effective dating del periodo), periodo, mese_concluso, target (cluster),
# input (campi mancanti = 0), atteso {meccanica: punti}.
# ============================================================================

- nome: cap_esatto_v1
  descrizione: "art. 5.1: 60 attivazioni × 10 = esattamente il cap 600"
  contratto_v: 1
  periodo: "2026-04"
  mese_concluso: true
  target: 80
  input: { luce_gas: 60 }
  atteso: { punti_commodity: 600 }

